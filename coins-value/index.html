<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella Bot | مؤشر قيمة العملة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-main: #f3f5fa;
            --bg-card: #ffffff;
            --bg-card-hover: #f8fafc;
            --text-title: #11131e;
            --text-body: #5f6674;
            --border: rgba(0, 0, 0, 0.05);
            --border-hover: rgba(77, 92, 170, 0.3);
            --primary: #4d5caa;
            --primary-glow: rgba(77, 92, 170, 0.06); 
            --nav-bg: rgba(243, 245, 250, 0.85);
            
            /* ألوان الحالات الديناميكية */
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.1);
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.1);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease, transform 0.3s ease;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            overflow-x: hidden;
            position: relative;
            padding-top: 110px;
        }

        .neon-glow-1 {
            position: absolute; top: -150px; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 700px; height: 700px; border-radius: 50%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 75%);
            z-index: -1; pointer-events: none;
        }

        .material-symbols-rounded {
            font-family: 'Material Symbols Rounded' !important;
            font-weight: normal; font-style: normal; font-size: 24px; line-height: 1;
            display: inline-block; direction: ltr; -webkit-font-smoothing: antialiased;
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Navbar ثابته ومتناسقة */
        nav {
            position: fixed; top: 0; left: 0; right: 0; height: 85px;
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; z-index: 1000;
        }

        .logo {
            font-size: 1.5rem; font-weight: 700; color: var(--text-title);
            display: flex; align-items: center; gap: 10px; text-decoration: none;
        }

        .btn-back {
            background: transparent; color: var(--text-title); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 12px; text-decoration: none; font-weight: 600;
            display: flex; align-items: center; gap: 6px; font-size: 0.9rem;
        }
        .btn-back:hover { background: var(--border); }

        /* حاوية المحتوى الرئيسي */
        .content-container {
            max-width: 1000px; margin: 0 auto; padding: 20px 5% 80px;
            display: flex; flex-direction: column; gap: 30px;
        }

        .page-header { text-align: center; margin-bottom: 10px; }
        .page-header h1 { font-size: 2.5rem; color: var(--text-title); font-weight: 700; margin-bottom: 10px; }
        .page-header p { font-size: 1.1rem; color: var(--text-body); }

        /* كارت عرض القيمة المباشرة */
        .value-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px;
            padding: 30px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.01); flex-wrap: wrap; gap: 20px;
        }

        .coin-meta { display: flex; align-items: center; gap: 20px; }
        .coin-icon-wrapper {
            width: 60px; height: 60px; background: rgba(77, 92, 170, 0.08);
            color: var(--primary); border-radius: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 32px;
        }

        .coin-details h2 { font-size: 1.4rem; color: var(--text-title); font-weight: 700; margin-bottom: 4px; }
        
        /* شارة الحالة المتغيرة تلقائياً */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
            border-radius: 100px; font-size: 0.85rem; font-weight: 600;
        }

        /* نظام التحديث والوقت المباشر */
        .live-update-tracker {
            display: flex; align-items: center; gap: 6px; font-size: 0.85rem;
            color: var(--text-body); font-weight: 500; margin-top: 6px; background: rgba(0, 0, 0, 0.03);
            padding: 4px 12px; border-radius: 8px; width: fit-content;
        }
        .pulse-dot {
            width: 7px; height: 7px; background-color: var(--primary); border-radius: 50%;
            animation: pulse-animation 1.5s infinite ease-in-out;
        }

        .coin-price-area { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; width: fit-content; }
        .coin-price {
            font-size: 2.8rem; font-weight: 700; color: var(--text-title); font-family: monospace;
            background: rgba(77, 92, 170, 0.04); padding: 6px 22px; border-radius: 16px;
            border: 1px solid rgba(77, 92, 170, 0.05); display: flex; align-items: center; gap: 8px;
        }

        /* كارت الرسم البياني */
        .chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.01); }
        .chart-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .chart-card-header h3 { font-size: 1.2rem; color: var(--text-title); font-weight: 600; }
        .chart-info-note { font-size: 0.85rem; color: var(--text-body); }
        .chart-wrapper { width: 100%; height: 320px; position: relative; }

        @keyframes pulse-animation {
            0% { transform: scale(0.9); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.4; }
        }

        footer { padding: 40px 5%; text-align: center; font-size: 0.9rem; color: var(--text-body); border-top: 1px solid var(--border); margin-top: auto; }
        footer span { color: var(--text-title); font-weight: 600; }

        @media (max-width: 768px) {
            body { padding-top: 100px; }
            .page-header h1 { font-size: 2rem; }
            .value-card { padding: 20px; flex-direction: column; text-align: center; }
            .coin-meta { flex-direction: column; gap: 10px; }
            .live-update-tracker { margin: 6px auto 0; }
            .coin-price-area { align-items: center; width: 100%; }
            .coin-price { font-size: 2.2rem; width: 100%; justify-content: center; }
            .chart-card { padding: 20px; }
            .chart-wrapper { height: 240px; }
        }
    </style>
</head>
<body>
    <div class="neon-glow-1"></div>
    
    <nav>
        <a href="/" class="logo">
            <span class="material-symbols-rounded" style="font-size: 30px; color: var(--primary);">cyclone</span>
            <span style="color: var(--text-title)">Stella Bot</span>
        </a>
        <a href="/" class="btn-back">
            <span class="material-symbols-rounded" style="font-size: 18px;">arrow_forward</span>
            الرئيسية
        </a>
    </nav>

    <div class="content-container">
        
        <div class="page-header">
            <h1>مؤشر قيمة عملة Stella</h1>
            <p>تتبع الأداء المباشر، الاستقرار، والتحديثات التاريخية لعملة ستيلا الرسمية.</p>
        </div>

        <div class="value-card">
            <div class="coin-meta">
                <div class="coin-icon-wrapper">
                    <span class="material-symbols-rounded">monetization_on</span>
                </div>
                <div class="coin-details">
                    <h2>عملة ستيلا (STLA)</h2>
                    
                    <div class="status-badge" id="coinStatusBadge"></div>
                    
                    <div class="live-update-tracker">
                        <div class="pulse-dot" id="statusPulseDot"></div>
                        <span id="liveTimeStamp">جاري جلب توقيت التحديث الفوري...</span>
                    </div>
                </div>
            </div>
            
            <div class="coin-price-area">
                <div class="coin-price" id="mainCoinPrice">
                    <span id="priceTrendIcon" class="material-symbols-rounded" style="font-size: 28px;">trending_flat</span>
                    <span id="priceText">1.00$</span>
                </div>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-card-header">
                <h3>مؤشر العملة (اليوم)</h3>
                <span class="chart-info-note">الايقونة ▲ تدل على اليوم</span>
            </div>
            <div class="chart-wrapper">
                <canvas id="stellaLiveChart"></canvas>
            </div>
        </div>

    </div>

    <footer>
        <p><span>Mazeej Studio</span> &copy; 2026</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // =================================================================
            // 🛑 1. اختر حالة العملة الحالية من هنا:
            // "stable" (مستقر/أخضر) | "warning" (متذبذب/أصفر) | "danger" (هبوط/أحمر)
            // =================================================================
            const currentStatus = "stable"; 

            // 🛑 2. ضع هنا أسعار الأيام التي تريد عرضها فقط.
            // الكود سيفهم تلقائياً كم يوماً أضفت، وسيجعل آخر رقم هو "اليوم الحالي".
            // مثال: إذا وضعت 4 أرقام، سيتوقف الرسم البياني عند اليوم الرابع (الثلاثاء) تلقائياً!
            const activePrices = [1.02, 1.02, 1.00, 1.00, 1.00, 1.00, 1.00]; // السبت، الأحد، الإثنين، الثلاثاء

            // أيام الأسبوع الثابتة الكاملة للشارت
            const allLabels = ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"]; 

            // دالة التحكم بالألوان والواجهات بناءً على الحالة المحددة
            const badgeElement = document.getElementById('coinStatusBadge');
            const pulseDot = document.getElementById('statusPulseDot');
            const trendIcon = document.getElementById('priceTrendIcon');
            let stateColor = "#10b981"; 

            if (currentStatus === "stable") {
                badgeElement.innerHTML = `<span class="material-symbols-rounded" style="font-size: 16px;">check_circle</span> مستقر`;
                badgeElement.style.backgroundColor = "var(--success-glow)"; badgeElement.style.color = "var(--success)";
                pulseDot.style.backgroundColor = "var(--success)";
                trendIcon.innerText = "trending_flat"; trendIcon.style.color = "var(--success)";
                stateColor = "#10b981";
            } else if (currentStatus === "warning") {
                badgeElement.innerHTML = `<span class="material-symbols-rounded" style="font-size: 16px;">warning</span> متذبذب`;
                badgeElement.style.backgroundColor = "var(--warning-glow)"; badgeElement.style.color = "var(--warning)";
                pulseDot.style.backgroundColor = "var(--warning)";
                trendIcon.innerText = "trending_down"; trendIcon.style.color = "var(--warning)";
                stateColor = "#f59e0b";
            } else if (currentStatus === "danger") {
                badgeElement.innerHTML = `<span class="material-symbols-rounded" style="font-size: 16px;">error</span> هبوط`;
                badgeElement.style.backgroundColor = "var(--danger-glow)"; badgeElement.style.color = "var(--danger)";
                pulseDot.style.backgroundColor = "var(--danger)";
                trendIcon.innerText = "trending_down"; trendIcon.style.color = "var(--danger)";
                stateColor = "#ef4444";
            }

            // ⚡ تحديد "مؤشر اليوم الحالي" ديناميكياً بناءً على عدد الأسعار التي أدخلتها أنت
            const currentDayIndex = activePrices.length - 1; 
            const currentArabicDay = allLabels[currentDayIndex] || "السبت";

            // تحويل المصفوفة لتعبئة الأيام المتبقية بـ null تلقائياً حتى لا تظهر في خط الشارت
            const chartDataValues = allLabels.map((val, idx) => {
                return idx <= currentDayIndex ? activePrices[idx] : null;
            });

            // ⚡ تحديث المربع الكبير تلقائياً بآخر قيمة أدخلتها في المصفوفة (قيمة اليوم الحالي)
            const todayPrice = activePrices[currentDayIndex] !== undefined ? activePrices[currentDayIndex] : 1.00;
            document.getElementById('priceText').innerText = todayPrice.toFixed(2) + "$";

            // تحديث سطر التوقيت
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
            hours = hours % 12; hours = hours ? hours : 12;
            document.getElementById('liveTimeStamp').innerText = `تم التحديث: اليوم ${currentArabicDay} الساعة ${hours}:${minutes} ${ampm}`;

            // تجهيز أنماط النقاط (آخر نقطة مضافة تظهر كمثلث)
            const pointStyles = [];
            const pointRadii = [];
            const pointHoverRadii = [];
            const pointColors = [];

            allLabels.forEach((day, index) => {
                if (index === currentDayIndex) { 
                    pointStyles.push('triangle'); 
                    pointRadii.push(11);          
                    pointHoverRadii.push(13);
                    pointColors.push(stateColor); 
                } else {
                    pointStyles.push('circle');   
                    pointRadii.push(5);
                    pointHoverRadii.push(8);
                    pointColors.push('#4d5caa');
                }
            });

            // بناء المخطط البياني
            const canvasElement = document.getElementById('stellaLiveChart');
            if (!canvasElement) return;

            const ctx = canvasElement.getContext('2d');
            const chartGradient = ctx.createLinearGradient(0, 0, 0, 280);
            chartGradient.addColorStop(0, 'rgba(77, 92, 170, 0.23)');
            chartGradient.addColorStop(1, 'rgba(77, 92, 170, 0.00)');

            // حساب النطاق العمودي ديناميكياً لمنع التكرار الكريه للكسور في المحور Y
            const validValues = chartDataValues.filter(v => v !== null);
            const minY = Math.min(...validValues) - 0.02;
            const maxY = Math.max(...validValues) + 0.02;

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allLabels, 
                    datasets: [{
                        label: 'القيمة',
                        data: chartDataValues, 
                        borderColor: '#4d5caa',
                        borderWidth: 3.5,
                        fill: true,
                        backgroundColor: chartGradient,
                        tension: 0.35,
                        pointStyle: pointStyles,      
                        pointRadius: pointRadii,      
                        pointHoverRadius: pointHoverRadii,
                        pointBackgroundColor: pointColors,
                        pointBorderColor: '#ffffff',
                        pointBorderWidth: 2,
                        spanGaps: false 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            rtl: true,
                            backgroundColor: '#11131e',
                            titleFont: { family: 'IBM Plex Sans Arabic', size: 13 },
                            bodyFont: { family: 'IBM Plex Sans Arabic', size: 13 },
                            padding: 12,
                            borderRadius: 10,
                            callbacks: {
                                title: function(context) {
                                    let idx = context[0].dataIndex;
                                    return idx === currentDayIndex ? `${context[0].label} (اليوم الحالي)` : context[0].label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#5f6674', font: { family: 'IBM Plex Sans Arabic', size: 12 } }
                        },
                        y: {
                            min: minY,
                            max: maxY,
                            grid: { color: 'rgba(0, 0, 0, 0.03)' },
                            ticks: { 
                                color: '#5f6674', 
                                font: { size: 12 },
                                stepSize: 0.01, 
                                callback: function(value) { return '$' + value.toFixed(2); }
                            }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
